<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=https://pranavsagar.pages.dev/">
    <link rel="canonical" href="https://pranavsagar.pages.dev/">
    <title>Redirecting to Pranav Sagar's Portfolio...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1e375f, #2d4a7a);
            color: white;
            text-align: center;
            padding: 2rem;
        }
        .redirect-container {
            max-width: 500px;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 1rem;
        }
        p {
            font-size: 1.1rem;
            opacity: 0.9;
            margin-bottom: 1.5rem;
        }
        a {
            color: #febe10;
            text-decoration: none;
            font-weight: 600;
            border-bottom: 2px solid #febe10;
            padding-bottom: 2px;
        }
        a:hover {
            opacity: 0.8;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 2rem auto 0;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
    <script>
        // Fallback JavaScript redirect
        window.location.href = 'https://pranavsagar.pages.dev/';
    </script>
</head>
<body>
    <div class="redirect-container">
        <h1>Redirecting...</h1>
        <p>You are being redirected to Pranav Sagar's portfolio.</p>
        <p>If you are not redirected automatically, please click <a href="https://pranavsagar.pages.dev/">here</a>.</p>
        <div class="spinner"></div>
    </div>
</body>
</html>
